---
- name: Upgrade Ubuntu/Debian system
  when: ansible_facts['os_family'] in ['Debian'] or "'proxmox' in group_names"
  block:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    - name: Upgrade all packages to latest version
      when: "'proxmox' not in group_names"
      ansible.builtin.apt:
        name: '*'
        state: latest
        upgrade: true

    - name: Upgrade proxmox system
      when: "'proxmox' in group_names"
      ansible.builtin.apt:
        upgrade: dist

    - name: Check if reboot required
      ansible.builtin.stat:
        path: "/var/run/reboot-required"
      register: reboot_required

    - name: Report if reboot required
      ansible.builtin.debug:
        msg: "Reboot required"
      when: reboot_required.stat.exists

    - name: Reboot server
      ansible.builtin.reboot:
        reboot_timeout: 300
      when:
        - reboot_required.stat.exists
        - linux_update_reboot | default(false) | bool
        - "'proxmox' not in group_names"

    - name: Report on updated packages
      ansible.builtin.shell: |
        tac /var/log/apt/history.log | awk '/^Start-Date:/{print; exit} {print}' | tac
      register: apt_history
      changed_when: false

    - name: Show updated packages
      ansible.builtin.debug:
        var: apt_history.stdout_lines
